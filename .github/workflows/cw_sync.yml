name: CW Pharma Auto Sync

on:
  schedule:
    - cron: '0 3 * * *'    # 10:00 Thai time (UTC+7)
    - cron: '0 11 * * *'   # 18:00 Thai time (UTC+7)
  workflow_dispatch:         # รันด้วยมือได้จาก GitHub → Actions tab

jobs:
  cw-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install playwright pandas requests openpyxl

      - name: Install Playwright browsers + system deps
        run: playwright install chromium --with-deps

      - name: Install Xvfb (virtual display for headful browser)
        run: sudo apt-get install -y xvfb

      - name: Run CW Pharma sync
        env:
          CW_URL:           ${{ secrets.CW_URL }}
          CW_USERNAME:      ${{ secrets.CW_USERNAME }}
          CW_PASSWORD:      ${{ secrets.CW_PASSWORD }}
          CW_URL_CNX:       ${{ secrets.CW_URL_CNX }}
          CW_USERNAME_CNX:  ${{ secrets.CW_USERNAME_CNX }}
          CW_PASSWORD_CNX:  ${{ secrets.CW_PASSWORD_CNX }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
        run: xvfb-run --auto-servernum python scripts/cw_sync_cloud.py

      - name: Upload debug artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-debug-run-${{ github.run_number }}
          path: /tmp/cw_sync/
          retention-days: 7
